name: Update Stock Data

on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * 1-5'  # 每个工作日早上7:30(UTC)更新，即北京时间15:30

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Update stock data
      run: |
        python stock.py | tee /tmp/update.log

    - name: Commit and push if changed
      run: |
        git config --global user.email "stock-bot"
        git config --global user.name "stock-bot"
        git add *.json
        MESSAGE=$(cat /tmp/update.log)
        git diff-index --quiet HEAD || git commit -m "$MESSAGE"
        git push
